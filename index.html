<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PLASMAE // Specimen Archive — Biotech Pixel Art Gallery</title>
  <meta name="description" content="A curated archive of biotech pixel-art specimens, generated in the Plasmae lab.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">PLASMAE&nbsp;&nbsp;//&nbsp;&nbsp;SPECIMEN ARCHIVE</div>
    <h1>Biotech Pixel Art Gallery<span class="blink">_</span></h1>
    <div class="tagline">A curated archive of synthetic specimens &mdash; <b>cultured</b>, catalogued, contained.</div>
  </header>

  <nav class="toolbar" id="filters"></nav>

  <main class="grid" id="grid"></main>

  <div class="lb" id="lb">
    <span class="close" id="lb-close">[ ESC ] CLOSE</span>
    <div class="panel">
      <div class="stage"><img id="lb-img" alt=""></div>
      <div class="info">
        <div class="kicker" id="lb-kicker"></div>
        <h2 id="lb-name"></h2>
        <div class="sub" id="lb-sub"></div>
        <dl id="lb-dl"></dl>
      </div>
    </div>
  </div>

  <footer>PLASMAE LAB &mdash; SPECIMENS CULTURED LOCALLY &middot; Z-IMAGE / ILLUSTRIOUS &middot; AUTONOMOUS PIPELINE</footer>

  <script src="app.js"></script>
</body>
</html>
